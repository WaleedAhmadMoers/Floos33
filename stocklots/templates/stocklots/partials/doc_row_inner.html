<div class="flex items-center justify-between gap-3 px-3 py-3 rounded-lg border border-slate-200 bg-white hover:border-amber-300">
  <div class="flex items-center gap-3 min-w-0">
    <span class="text-xl leading-none">{{ icon }}</span>
    <div class="flex flex-col min-w-0 space-y-0.5">
      <span class="font-semibold text-slate-900 leading-tight truncate" title="{{ fname }}">{{ fname }}</span>
      <div class="flex items-center gap-2 text-xs text-slate-500">
        {% if type_label %}<span class="font-medium">{{ type_label }}</span>{% endif %}
        {% if doc.file.size %}<span aria-hidden="true">•</span><span>{{ doc.file.size|filesizeformat }}</span>{% endif %}
      </div>
    </div>
  </div>
  <div class="flex items-center gap-2 sm:gap-3">
    <a href="{{ doc.file.url }}" class="inline-flex items-center px-3 py-1.5 rounded-md border border-slate-200 text-amber-700 hover:border-amber-300 hover:text-amber-800 font-semibold">View</a>
    <a href="{{ doc.file.url }}" download class="inline-flex items-center px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-slate-300 hover:text-slate-900 font-semibold">Download</a>
  </div>
</div>
